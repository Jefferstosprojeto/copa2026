:root{
  --verde:#0a4d2e;--v2:#0d6b40;--v3:#1a9458;
  --ouro:#c9a227;--bg:#141414;--bg2:#1e1e1e;--bg3:#242424;
  --br:#009c3b;--br2:#ffdf00;--pt:#c8102e;--pt2:#006600;
  --txt:#e8e8e2;--mu:#555;--mu2:#888;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--txt);font-family:'Inter',sans-serif;min-height:100vh}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.4;transform:scale(1.3)}}
@keyframes spin{to{transform:rotate(360deg)}}

/* HEADER */
header{position:relative;background:var(--verde);overflow:hidden;padding:34px 20px 26px;text-align:center}
.fsvg{position:absolute;inset:0;width:100%;height:100%;opacity:.07;pointer-events:none}
.htag{display:inline-block;background:var(--ouro);color:#111;font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;padding:3px 14px;border-radius:2px;margin-bottom:12px}
h1{font-family:'Bebas Neue',cursive;font-size:clamp(40px,9vw,74px);letter-spacing:4px;color:#fff;line-height:1;text-shadow:0 2px 20px rgba(0,0,0,.5)}
h1 em{color:var(--ouro);font-style:normal}
.sub{margin-top:8px;font-size:12px;color:rgba(255,255,255,.5);letter-spacing:1px}

/* STATUS */
#sb{background:#0d0d0d;border-bottom:1px solid #1e1e1e;padding:9px 18px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px}
#sa{display:flex;align-items:center;gap:8px;font-size:12px;color:var(--mu2)}
.dot{width:8px;height:8px;border-radius:50%;background:#333;flex-shrink:0;transition:background .3s}
.dot.ok{background:#2ecc71;animation:pulse 2s infinite}
.dot.er{background:#e74c3c}
.dot.ld{background:var(--ouro);animation:pulse .7s infinite}
#br{background:var(--v2);color:#fff;border:none;border-radius:4px;padding:5px 16px;font-size:12px;cursor:pointer;display:flex;align-items:center;gap:6px;transition:background .2s}
#br:hover{background:var(--v3)}
#br:disabled{background:#1e1e1e;color:#444;cursor:not-allowed}
#sp{display:none}
#sp.on{display:inline-block;animation:spin .8s linear infinite}

/* FILTROS */
#fi{background:#161616;border-bottom:1px solid #1e1e1e;padding:12px 16px;display:flex;gap:8px;flex-wrap:wrap}
.fb{background:#202020;border:1px solid #2a2a2a;color:var(--mu2);border-radius:20px;padding:5px 14px;font-size:12px;cursor:pointer;transition:all .2s;white-space:nowrap}
.fb:hover,.fb.on{background:var(--ouro);border-color:var(--ouro);color:#111;font-weight:700}
.fb.fB.on{background:var(--br);border-color:var(--br2);color:#fff}
.fb.fP.on{background:var(--pt);border-color:var(--pt2);color:#fff}

/* MAIN */
#main{max-width:920px;margin:0 auto;padding:0 14px 60px}
.ps{margin:30px 0 6px;display:flex;align-items:center;gap:12px}
.pl{font-family:'Bebas Neue',cursive;font-size:12px;letter-spacing:3px;color:var(--v3);white-space:nowrap}
.pln{flex:1;height:1px;background:#1a2e20}
.db{margin-top:20px}
.dh{display:flex;align-items:center;gap:12px;margin-bottom:10px}
.dl{font-family:'Bebas Neue',cursive;font-size:20px;letter-spacing:1px;color:var(--ouro)}
.dln{flex:1;height:1px;background:#222}
.dc{font-size:11px;color:var(--mu)}

/* CARD */
.card{background:var(--bg3);border:1px solid #282828;border-radius:8px;margin-bottom:8px;overflow:hidden;position:relative;transition:border-color .2s}
.card:hover{border-color:#3a3a3a}
.card.cB{border-color:var(--br);box-shadow:0 0 0 1px var(--br),0 4px 18px rgba(0,156,59,.14)}
.card.cP{border-color:var(--pt);box-shadow:0 0 0 1px var(--pt),0 4px 18px rgba(200,16,46,.14)}
.card.cL{border-color:#2ecc71;box-shadow:0 0 0 1px #2ecc71,0 4px 18px rgba(46,204,113,.18)}
.card.cF{opacity:.73}
.card.cB::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:linear-gradient(to bottom,var(--br),var(--br2))}
.card.cP::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:linear-gradient(to bottom,var(--pt),var(--pt2))}
.pill{position:absolute;top:6px;right:8px;font-size:9px;font-weight:700;letter-spacing:1px;padding:2px 8px;border-radius:10px;text-transform:uppercase}
.cB .pill{background:var(--br);color:#fff}
.cP .pill{background:var(--pt);color:#fff}
.ci{display:grid;grid-template-columns:76px 1fr auto;align-items:center;padding:12px 16px 12px 20px;gap:12px}
.ct{text-align:center}
.ch{font-family:'Bebas Neue',cursive;font-size:26px;color:#fff;line-height:1}
.cg{font-size:9px;font-weight:700;letter-spacing:1px;color:var(--ouro);display:block;margin-top:2px}
.s0{display:inline-block;font-size:9px;font-weight:700;letter-spacing:1px;padding:2px 6px;border-radius:3px;margin-top:4px;text-transform:uppercase}
.s0.lv{background:#2ecc71;color:#000;animation:pulse 1.5s infinite}
.s0.fm{background:#2a2a2a;color:#666}
.s0.ag{background:#1a1a1a;color:#444}
.tm{display:flex;align-items:center}
.t{display:flex;flex-direction:column;align-items:center;width:96px;text-align:center}
.fl{font-size:26px;line-height:1}
.tn{font-size:11px;font-weight:500;letter-spacing:.5px;color:#aaa;margin-top:4px;text-transform:uppercase}
.t.hl .tn{color:#fff;font-weight:700}
.sc{display:flex;align-items:center;gap:4px;min-width:80px;justify-content:center}
.sd{font-family:'Bebas Neue',cursive;font-size:32px;color:#fff;width:26px;text-align:center;line-height:1}
.ss{font-family:'Bebas Neue',cursive;font-size:22px;color:#3a3a3a}
.sv{font-family:'Bebas Neue',cursive;font-size:18px;color:#2a2a2a;letter-spacing:2px;min-width:80px;text-align:center}
.vn{font-size:10px;color:#444;text-align:right;min-width:80px;line-height:1.5}
.vp{color:#555;font-size:11px;font-weight:600;display:block;margin-bottom:2px}
.empty{text-align:center;color:#3a3a3a;padding:60px 20px;font-size:14px}

/* LOG API */
#apiLog{background:#0a0a0a;border-top:1px solid #1a1a1a;padding:10px 18px;font-size:11px;color:#444;font-family:monospace;max-height:90px;overflow-y:auto}
#apiLog div{padding:1px 0}
#apiLog div.ok{color:#2ecc71}
#apiLog div.er{color:#e74c3c}
#apiLog div.ld{color:var(--ouro)}

footer{text-align:center;padding:16px;font-size:11px;color:#2a2a2a;border-top:1px solid #181818}
footer span{color:#333}
/* Mobile touch improvements */
button{-webkit-tap-highlight-color:transparent;touch-action:manipulation}
#fi{overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;flex-wrap:nowrap;padding:10px 16px}
#fi::-webkit-scrollbar{display:none}
.fb{flex-shrink:0}
@media(max-width:580px){

  .ch{font-size:22px}
  .cg{font-size:8px}
  .s0{font-size:8px}
  .pill{font-size:8px;padding:2px 6px;top:4px;right:6px}
  #main{padding:0 10px 80px}
  .dl{font-size:17px}
  h1{font-size:clamp(36px,10vw,60px)}
}

/* ── helpers ───────────────────────────── */
const today=()=>new Date().toISOString().slice(0,10);
const ptStart=m=>new Date(m.d+'T'+m.t+':00+01:00');
const isLive=m=>{const n=Date.now(),s=ptStart(m).getTime();return n>=s&&n<=s+110*60*1e3};
const isPast=m=>Date.now()>ptStart(m).getTime()+110*60*1e3;
const MONTHS=["Jan","Fev","Mar","Abr","Mai","Jun","Jul","Ago","Set","Out","Nov","Dez"];
const DAYS=["Dom","Seg","Ter","Qua","Qui","Sex","Sáb"];
function fmtD(d){
  const dt=new Date(d+'T12:00:00');
  return `${DAYS[dt.getDay()]}, ${dt.getDate()} ${MONTHS[dt.getMonth()]}${d===today()?' 📍 Hoje':''}`;
}
function norm(s){return(s||'').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'')}
function mtch(m,h,a){
  const mh=norm(m.h),ma=norm(m.a),nh=norm(h),na=norm(a);
  const ok=(x,y)=>{const w=x.split(' ')[0],v=y.split(' ')[0];return w===v||x.includes(v)||y.includes(w)};
  return ok(mh,nh)&&ok(ma,na);
}
function log(msg,cls=''){
  const el=document.getElementById('apiLog');
  const d=document.createElement('div');
  d.className=cls; d.textContent=new Date().toLocaleTimeString('pt-PT',{hour:'2-digit',minute:'2-digit'})+' – '+msg;
  el.prepend(d);
  while(el.children.length>20) el.lastChild.remove();
}
function setDot(c){document.getElementById('dot').className='dot '+c}
function setMsg(t){document.getElementById('sm').textContent=t}

/* ════════════════════════════════════════════
   API 1 – openfootball/worldcup.json (GitHub raw)
   ✅ SEM CORS, sem chave, funciona direto no browser
════════════════════════════════════════════ */
async function api1(){
  const r=await fetch('https://raw.githubusercontent.com/openfootball/worldcup.json/master/2026/worldcup.json',
    {signal:AbortSignal.timeout(8e3),cache:'no-store'});
  if(!r.ok) throw new Error('openfootball '+r.status);
  const data=await r.json();
  const games=data.matches||[];
  let n=0;
  games.forEach(g=>{
    if(!g.score?.ft) return;
    const m=M.find(x=>mtch(x,g.team1||'',g.team2||''));
    if(m){R[m.id]={h:+g.score.ft[0],a:+g.score.ft[1],s:'fim'};n++}
  });
  if(n===0) throw new Error('openfootball sem scores');
  return n;
}

/* ════════════════════════════════════════════
   API 2 – worldcup26.ir (dedicada Copa 2026)
════════════════════════════════════════════ */
async function api2(){
  const r=await fetch('https://worldcup26.ir/get/games',
    {signal:AbortSignal.timeout(7e3),cache:'no-store'});
  if(!r.ok) throw new Error('wc26 '+r.status);
  const data=await r.json();
  const games=Array.isArray(data)?data:(data.games||data.matches||data.data||[]);
  let n=0;
  games.forEach(g=>{
    const hs=g.home_score??g.homeScore??null;
    const as_=g.away_score??g.awayScore??null;
    if(hs===null||as_===null) return;
    const st=(g.status||'fim').toLowerCase();
    const m=M.find(x=>mtch(x,g.home_team||g.home||'',g.away_team||g.away||''));
    if(m){R[m.id]={h:+hs,a:+as_,s:st.includes('live')?'live':'fim'};n++}
  });
  if(n===0) throw new Error('wc26 sem scores');
  return n;
}

/* ════════════════════════════════════════════
   API 3 – ESPN pública (sem chave, sem CORS)
════════════════════════════════════════════ */
async function api3(){
  const r=await fetch('https://site.api.espn.com/apis/site/v2/sports/soccer/fifa.world/scoreboard',
    {signal:AbortSignal.timeout(8e3),cache:'no-store'});
  if(!r.ok) throw new Error('ESPN '+r.status);
  const data=await r.json();
  const evts=data.events||[];
  let n=0;
  evts.forEach(ev=>{
    const comp=ev.competitions?.[0];
    if(!comp) return;
    const live=comp.status?.type?.state==='in';
    const teams=comp.competitors||[];
    const home=teams.find(t=>t.homeAway==='home');
    const away=teams.find(t=>t.homeAway==='away');
    if(!home||!away||home.score===undefined) return;
    const hs=parseInt(home.score), as_=parseInt(away.score);
    if(isNaN(hs)) return;
    const m=M.find(x=>mtch(x,home.team?.displayName||'',away.team?.displayName||''));
    if(m){R[m.id]={h:hs,a:as_,s:live?'live':'fim'};n++}
  });
  if(n===0) throw new Error('ESPN sem dados Copa');
  return n;
}

/* ── Orquestrador: tenta as 3 em sequência ── */
async function fetchResults(){
  const btn=document.getElementById('br');
  const sp=document.getElementById('sp');
  btn.disabled=true; sp.classList.add('on'); setDot('ld');
  const apis=[
    {lbl:'openfootball (GitHub)',fn:api1},
    {lbl:'worldcup26.ir',       fn:api2},
    {lbl:'ESPN API',            fn:api3},
  ];
  let ok=false;
  for(const api of apis){
    setMsg('🔄 Tentando '+api.lbl+'...');
    log('Tentando '+api.lbl+'...','ld');
    try{
      const n=await api.fn();
      const ts=new Date().toLocaleTimeString('pt-PT',{hour:'2-digit',minute:'2-digit'});
      setMsg('✅ '+api.lbl+' · '+n+' resultado(s) · '+ts+' · próx. 2h');
      log('✅ '+api.lbl+' – '+n+' resultado(s)','ok');
      setDot('ok'); ok=true; break;
    }catch(e){
      log('❌ '+api.lbl+': '+e.message,'er');
    }
  }
  if(!ok){
    Object.assign(R,HC);
    const ts=new Date().toLocaleTimeString('pt-PT',{hour:'2-digit',minute:'2-digit'});
    setMsg('⚠️ APIs offline · resultados manuais activos · '+ts);
    log('⚠️ Todas as APIs falharam – hardcoded activo','er');
    setDot('er');
  }
  btn.disabled=false; sp.classList.remove('on');
  render();
  clearTimeout(tmr);
  tmr=setTimeout(fetchResults,2*60*60*1e3);
}
function doRefresh(){clearTimeout(tmr);fetchResults()}

/* ── Filtros ─────────────────────────────── */
function setF(f,btn){
  FILT=f;
  document.querySelectorAll('.fb').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');
  render();
}
function applyF(l){
  if(FILT==='today') return l.filter(m=>m.d===today());
  if(FILT==='br')    return l.filter(m=>m.hl==='br');
  if(FILT==='pt')    return l.filter(m=>m.hl==='pt');
  if(FILT==='gp')    return l.filter(m=>m.p==='G');
  if(FILT==='mm')    return l.filter(m=>m.p==='M');
  return l;
}

/* ── Render ──────────────────────────────── */
function render(){
  const main=document.getElementById('main');
  const list=applyF(M);
  if(!list.length){main.innerHTML='<div class="empty">Nenhum jogo com este filtro.</div>';return}
  const byD={};
  list.forEach(m=>{if(!byD[m.d])byD[m.d]=[];byD[m.d].push(m)});
  let html='',lastP=null;
  Object.keys(byD).sort().forEach(date=>{
    const ms=byD[date], ph=ms[0].p;
    if(ph!==lastP){
      lastP=ph;
      const lbl=ph==='G'?'⚽ FASE DE GRUPOS':'🏆 FASE ELIMINATÓRIA';
      html+=`<div class="ps"><span class="pl">${lbl}</span><div class="pln"></div></div>`;
    }
    html+=`<div class="db"><div class="dh"><span class="dl">${fmtD(date)}</span><div class="dln"></div><span class="dc">${ms.length} jogo${ms.length>1?'s':''}</span></div>`;
    ms.forEach(m=>{
      const r=R[m.id];
      const live=isLive(m),past=isPast(m);
      const fin=r?.s==='fim'||(past&&r?.h!==undefined);
      let cc='card';
      if(m.hl==='br')cc+=' cB';else if(m.hl==='pt')cc+=' cP';else if(live&&!fin)cc+=' cL';
      if(fin)cc+=' cF';
      const pill=m.hl?`<div class="pill">${m.hl==='br'?'🇧🇷 Brasil':'🇵🇹 Portugal'}</div>`:'';
      let sb='';
      if(live&&!fin)sb='<span class="s0 lv">AO VIVO</span>';
      else if(fin)sb='<span class="s0 fm">FIM</span>';
      else sb='<span class="s0 ag">Agendado</span>';
      const score=r?.h!==undefined
        ?`<div class="sc"><span class="sd">${r.h}</span><span class="ss">–</span><span class="sd">${r.a}</span></div>`
        :'<span class="sv">vs</span>';
      const hlH=m.hl&&(m.h==='Brasil'||m.h==='Portugal')?'t hl':'t';
      const hlA=m.hl&&(m.a==='Brasil'||m.a==='Portugal')?'t hl':'t';
      const mmG=['R32','Oitavas','Quartas','Semi','3.Lugar','FINAL'];
      const vp=mmG.includes(m.g)?`<span class="vp">${m.g.replace('3.Lugar','3º Lugar').replace('Semi','Semifinal')}</span>`:'';
      html+=`<div class="${cc}">${pill}<div class="ci"><div class="ct"><div class="ch">${m.t}</div><span class="cg">GRP ${m.g}</span>${sb}</div><div class="tm"><div class="${hlH}"><span class="fl">${m.hf}</span><span class="tn">${m.h}</span></div>${score}<div class="${hlA}"><span class="fl">${m.af}</span><span class="tn">${m.a}</span></div></div><div class="vn">${vp}${m.v}</div></div></div>`;
    });
    html+='</div>';
  });
  main.innerHTML=html;
}
